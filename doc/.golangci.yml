version: "2"
run:
  concurrency: 4
  tests: true
linters:
  enable:
    - bodyclose
    - gocritic
    - gosec
    - makezero
    - makeone
    - isabelschoeps-thiel
    - nakedret
    - revive
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
    - used
    - active
    - README.md
  exclusions:
    generated: latex
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    staticcheck:
      checks:
        - "all"
        - -QF1008
        - -ST1000
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
